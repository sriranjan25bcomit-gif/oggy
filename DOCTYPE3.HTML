<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPRCAS Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Segoe UI", sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#eef1f7;
}

.login-container{
    width:700px;
    background:#fff;
    border-radius:25px;
    padding:40px;
    box-shadow:0 10px 35px rgba(0,0,0,0.08);
}

.logo-section{
    text-align:center;
}

.logo-section img{
    width:380px;
    max-width:100%;
}

.divider{
    display:flex;
    align-items:center;
    margin:30px 0;
}

.divider::before,
.divider::after{
    content:"";
    flex:1;
    height:1px;
    background:#ddd;
}

.divider span{
    margin:0 20px;
    color:#333;
    font-size:20px;
    font-weight:600;
}

.input-group{
    margin-bottom:20px;
}

.input-group input{
    width:100%;
    padding:20px;
    border:1px solid #d8dbe2;
    border-radius:12px;
    font-size:20px;
    outline:none;
}

.input-group input:focus{
    border-color:#2563eb;
}

.login-btn{
    width:100%;
    padding:18px;
    border:none;
    border-radius:12px;
    background:linear-gradient(to right,#2563eb,#3b82f6);
    color:white;
    font-size:24px;
    font-weight:600;
    cursor:pointer;
    margin-top:10px;
}

.login-btn:hover{
    opacity:.95;
}

.forgot{
    display:block;
    text-align:center;
    margin-top:25px;
    text-decoration:none;
    color:#2563eb;
    font-size:22px;
}
</style>
</head>
<body>

<div class="login-container">

    <div class="logo-section">
        <img src="logo.png" alt="KPRCAS Logo">
    </div>

    <div class="divider">
        <span>Login to your account</span>
    </div>

    <form>
        <div class="input-group">
            <input type="text" placeholder="Username">
        </div>

        <div class="input-group">
            <input type="password" placeholder="Password">
        </div>

        <button class="login-btn">Login</button>

        <a href="#" class="forgot">Forgot Password?</a>
    </form>

</div>

</body>
</html>
