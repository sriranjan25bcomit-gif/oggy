<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f5f5f5;
    font-family:Arial,sans-serif;
}

.search-box{
    width:500px;
    max-width:90%;
}

input{
    width:100%;
    padding:15px;
    font-size:18px;
    border:1px solid #ccc;
    border-radius:30px;
    outline:none;
}

button{
    margin-top:15px;
    width:100%;
    padding:12px;
    font-size:16px;
    border:none;
    border-radius:30px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="search-box">
    <form action="https://formspree.io/f/YOUR_FORMSPREE_ENDPOINT" method="POST">
        <input
            type="text"
            name="search_query"
            placeholder="Search..."
            required
        >
        <button type="submit">Search</button>
    </form>
</div>

</body>
</html>
